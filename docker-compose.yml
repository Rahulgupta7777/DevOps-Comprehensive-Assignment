version: "3.9"
services:

  app:
    build: .
    container_name: app
    ports:

      - "80:80"
    environment:

      - MONGO_URI=mongodb://mongo:27017/devops_db
      - PORT=80
    depends_on:
      - mongo
    networks:
      - app-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: mongo
    volumes:

      - mongo-data:/data/db
    networks:
      - app-net
    restart: unless-stopped


volumes:
  mongo-data:


networks:
  app-net:
    driver: bridge